<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ACE{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/ace.css">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  {% block head %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
  <div id="ace-statusbar" aria-hidden="true">
    <span class="ace-statusbar-ambient" id="ace-statusbar-ambient"></span>
    <span class="ace-statusbar-event" id="ace-statusbar-event"></span>
  </div>
  <div aria-live="polite" aria-atomic="true" class="ace-sr-only" id="ace-live-region"></div>
  <div role="alert" aria-live="assertive" aria-atomic="true" class="ace-sr-only" id="ace-live-region-assertive"></div>
  <script src="/static/js/htmx.min.js"></script>
  <script src="/static/js/fuzzysort.min.js"></script>
  {% block pre_bridge_scripts %}{% endblock %}
  <script src="/static/js/runtime.js"></script>
  <script src="/static/js/ace_notes.js"></script>
  <script src="/static/js/coding_keyboard.js"></script>
  <script src="/static/js/bridge.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
