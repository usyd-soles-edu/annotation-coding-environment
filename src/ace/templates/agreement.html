{% extends "base.html" %}

{% block title %}Agreement — ACE{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/agreement.css">
{% endblock %}

{% block content %}
<main class="ace-agreement-page">
  <a href="/" class="ace-back">← Home</a>

  <div id="agreement-results">
    <h1 id="ace-agreement-title" class="ace-agreement-title" tabindex="-1">Inter-Coder Agreement</h1>
    <div class="ace-agreement-empty">
      <p>Select 2 or more .ace files to compute agreement. Each .ace file holds one coder's work.</p>
      <div class="ace-agreement-empty-actions">
        <button class="ace-agreement-choose-btn" data-agreement-pick-start aria-keyshortcuts="F R" onclick="acePickAndCompute()">Choose files</button>
        <span class="ace-agreement-empty-shortcut">F</span>
      </div>
    </div>
  </div>
</main>
{% endblock %}

{% block scripts %}
<script>
(function() {
  "use strict";

  var _HEADING = '<h1 id="ace-agreement-title" class="ace-agreement-title" tabindex="-1">Inter-Coder Agreement</h1>';
  // Snapshot the server-rendered pick state so the under-2-files branch can
  // restore it verbatim instead of re-typing the markup.
  var _initialResults = (document.getElementById("agreement-results") || {}).innerHTML || "";

  // Single module-level interval handle so a re-pick mid-compute clears the
  // previous poll instead of racing two polls on app.state.agreement_progress.
  var _agreementPoll = null;
  var _agreementSelectedPaths = [];
  var _agreementPreviewSeq = 0;
  var _agreementPreviewPending = false;
  var _agreementPreviewSettling = false;
  var _agreementBlockSyntheticComputeAfterRemove = false;
  var _agreementReviewState = null;
  var _suppressAgreementHistory = false;
  var _agreementReviewRestoredFromHistory = false;
  var _agreementComputeSeq = 0;
  var _activeAgreementComputeSeq = 0;
  var _cancelledAgreementComputeSeqs = {};
  var _cancelledAgreementComputeOrder = [];
  var _MAX_CANCELLED_COMPUTES = 20;

  function _stopPoll() {
    if (_agreementPoll) { clearInterval(_agreementPoll); _agreementPoll = null; }
  }

  // Flip the progress bar to its error state. Shared by the transport-failure
  // listener and the poll's error branch (which used to fork the same DOM
  // mutation). subText is optional.
  function _showError(labelText, subText) {
    var computeSeq = _activeAgreementComputeSeq;
    _stopPoll();
    var fill = document.getElementById("ace-agreement-progress-fill");
    var label = document.getElementById("ace-agreement-progress-label");
    var sub = document.getElementById("ace-agreement-progress-sub");
    if (fill) {
      fill.classList.add("is-error");
      fill.style.width = "100%";
      fill.setAttribute("aria-valuenow", "100");
    }
    if (label) { label.classList.add("is-error"); label.textContent = labelText; }
    if (sub && subText) { sub.textContent = subText; }
    _activeAgreementComputeSeq = 0;
    if (!_suppressAgreementHistory) {
      var results = document.getElementById("agreement-results");
      if (results) {
        _replaceAgreementHistory("error", results.innerHTML, _selectedAgreementPaths(), computeSeq);
      }
    }
  }

  // I2: a 5xx here would only be a genuine transport failure (the route now
  // always returns 200 with an error fragment). Stop the poll and surface it
  // so the bar doesn't spin forever.
  document.addEventListener("htmx:responseError", function (e) {
    if (!_agreementPoll) { return; }
    var path = e.detail && e.detail.request && e.detail.request.path;
    var verb = e.detail && e.detail.request && e.detail.request.verb;
    if (path === "/api/agreement/compute"
        && String(verb).toUpperCase() === "POST") {
      _showError("Couldn’t reach the server — try again.");
    }
  });

  function _showGenericAgreementError() {
    var results = document.getElementById("agreement-results");
    _agreementSelectedPaths = [];
    _setAgreementReviewBusy(false);
    results.innerHTML =
      _HEADING +
      '<div class="ace-agreement-error">' +
      '<p>Something went wrong. Please try again.</p>' +
      '<div class="ace-agreement-empty-actions">' +
      '<button class="ace-agreement-choose-btn" data-agreement-pick-start aria-keyshortcuts="F R" onclick="acePickAndCompute()">Choose different files</button>' +
      '<span class="ace-agreement-empty-shortcut">F</span>' +
      '</div>' +
      '</div>';
    _focusAgreementTitle();
  }

  function _focusAgreementTitle() {
    var title = document.querySelector("#agreement-results .ace-agreement-title");
    if (title) {
      if (!title.hasAttribute("tabindex")) {
        title.setAttribute("tabindex", "-1");
      }
      title.focus({ preventScroll: true });
    }
  }

  function _invalidateAgreementCompute() {
    _agreementComputeSeq += 1;
    _activeAgreementComputeSeq = 0;
  }

  function _rememberCancelledAgreementCompute(seq) {
    if (!seq || _cancelledAgreementComputeSeqs[seq]) { return; }
    _cancelledAgreementComputeSeqs[seq] = true;
    _cancelledAgreementComputeOrder.push(seq);
    while (_cancelledAgreementComputeOrder.length > _MAX_CANCELLED_COMPUTES) {
      delete _cancelledAgreementComputeSeqs[_cancelledAgreementComputeOrder.shift()];
    }
  }

  function _focusAgreementChoose() {
    var choose = document.querySelector("[data-agreement-pick-start], [data-agreement-choose-again]");
    if (choose) {
      choose.focus({ preventScroll: true });
      return;
    }
    _focusAgreementTitle();
  }

  function _agreementState(kind, html, paths, computeSeq) {
    return {
      aceAgreement: true,
      kind: kind || "panel",
      html: html,
      paths: Array.isArray(paths) ? paths.slice() : [],
      computeSeq: computeSeq || 0,
    };
  }

  function _replaceAgreementHistory(kind, html, paths, computeSeq) {
    if (!window.history || !window.history.replaceState) { return; }
    try {
      window.history.replaceState(_agreementState(kind, html, paths, computeSeq), "", window.location.href);
    } catch (e) {
      // Some browsers reject large history states. Keep the current UI usable.
    }
  }

  function _pushAgreementHistory(kind, html, paths, computeSeq) {
    if (!window.history || !window.history.pushState) { return; }
    try {
      window.history.pushState(_agreementState(kind, html, paths, computeSeq), "", window.location.href);
    } catch (e) {
      // Some browsers reject large history states. Keep the current UI usable.
    }
  }

  function _rememberAgreementPanel(kind, html, paths) {
    var state = _agreementState(kind, html, paths);
    if (kind === "review") {
      _agreementReviewState = state;
    }
    if (_suppressAgreementHistory) {
      return;
    }
    if (_agreementReviewRestoredFromHistory) {
      _pushAgreementHistory(kind, html, paths);
      _agreementReviewRestoredFromHistory = false;
    } else {
      _replaceAgreementHistory(kind, html, paths);
    }
  }

  function _restoreAgreementState(state) {
    if (!state || state.aceAgreement !== true || typeof state.html !== "string") {
      return false;
    }
    if (state.computeSeq && _cancelledAgreementComputeSeqs[state.computeSeq] && _agreementReviewState) {
      state = _agreementReviewState;
    }
    var results = document.getElementById("agreement-results");
    var hadActiveCompute = _activeAgreementComputeSeq !== 0;
    var cancelledComputeSeq = _activeAgreementComputeSeq;
    _stopPoll();
    _invalidateAgreementCompute();
    _setAgreementReviewBusy(false);
    _agreementSelectedPaths = Array.isArray(state.paths) ? state.paths.slice() : [];
    results.innerHTML = state.html;
    if (state.kind === "review" || results.querySelector(".ace-agreement-review")) {
      _agreementReviewState = _agreementState("review", state.html, _agreementSelectedPaths);
      _agreementReviewRestoredFromHistory = true;
      if (hadActiveCompute) {
        _rememberCancelledAgreementCompute(cancelledComputeSeq);
        _pushAgreementHistory("review", state.html, _agreementSelectedPaths);
        _agreementReviewRestoredFromHistory = false;
      }
    } else {
      _agreementReviewRestoredFromHistory = false;
    }
    _focusAgreementTitle();
    return true;
  }

  function _selectedAgreementPaths() {
    if (_agreementSelectedPaths.length) {
      return _agreementSelectedPaths.slice();
    }
    var dataEl = document.getElementById("ace-agreement-selected-paths");
    if (!dataEl) { return []; }
    try {
      var parsed = JSON.parse(dataEl.textContent || "[]");
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      return [];
    }
  }

  function _setAgreementReviewBusy(busy) {
    _agreementPreviewPending = busy;
    if (busy) {
      _agreementPreviewSettling = true;
    }
    var results = document.getElementById("agreement-results");
    if (results) {
      results.dataset.agreementPreviewPending = busy ? "true" : "false";
    }
    document.querySelectorAll("[data-agreement-remove], [data-agreement-compute]").forEach(function (button) {
      if (busy) {
        button.dataset.agreementWasDisabled = button.disabled ? "1" : "0";
        button.disabled = true;
      } else if (button.dataset.agreementWasDisabled) {
        button.disabled = button.dataset.agreementWasDisabled === "1";
        delete button.dataset.agreementWasDisabled;
      }
      button.setAttribute("aria-busy", busy ? "true" : "false");
    });
    if (!busy) {
      window.setTimeout(function () {
        _agreementPreviewSettling = false;
      }, 0);
    }
  }

  function _restoreAgreementFocus(index) {
    if (typeof index !== "number" || index < 0) { return; }
    var removeButtons = document.querySelectorAll("[data-agreement-remove]");
    var next = removeButtons[Math.min(index, removeButtons.length - 1)];
    if (next) {
      next.focus();
      return;
    }
    var compute = document.querySelector("[data-agreement-compute]");
    if (compute && !compute.disabled) {
      compute.focus();
    }
  }

  function _agreementFileRows() {
    return Array.from(document.querySelectorAll("[data-agreement-file-row]"));
  }

  function _agreementFileIndexFromElement(el) {
    var row = el && el.closest && el.closest("[data-agreement-file-row]");
    if (!row) { return -1; }
    var rawIndex = row.getAttribute("data-index");
    if (!rawIndex || !/^\d+$/.test(rawIndex)) { return -1; }
    var index = Number(rawIndex);
    return Number.isInteger(index) ? index : -1;
  }

  function _focusAgreementFileRow(index) {
    var rows = _agreementFileRows();
    if (!rows.length) { return false; }
    var safeIndex = Math.max(0, Math.min(index, rows.length - 1));
    rows.forEach(function (row, i) {
      row.tabIndex = i === safeIndex ? 0 : -1;
    });
    rows[safeIndex].focus({ preventScroll: true });
    return true;
  }

  function _focusNextAgreementFileRow(delta) {
    var rows = _agreementFileRows();
    if (!rows.length) { return false; }
    var current = rows.indexOf(document.activeElement);
    if (current < 0) {
      current = _agreementFileIndexFromElement(document.activeElement);
    }
    var next = current < 0 ? 0 : current + delta;
    if (next < 0) {
      next = rows.length - 1;
    } else if (next >= rows.length) {
      next = 0;
    }
    return _focusAgreementFileRow(next);
  }

  function _agreementShortcutAllowed(event) {
    if (event.defaultPrevented || event.metaKey || event.ctrlKey || event.altKey) {
      return false;
    }
    var target = event.target;
    if (!target) { return true; }
    var tag = (target.tagName || "").toLowerCase();
    return !(target.isContentEditable || tag === "input" || tag === "textarea" || tag === "select");
  }

  function _removeAgreementFileAt(idx, opts) {
    var paths = _selectedAgreementPaths();
    if (!Number.isInteger(idx) || idx < 0 || idx >= paths.length) {
      return false;
    }
    opts = opts || {};
    _agreementBlockSyntheticComputeAfterRemove = true;
    _setAgreementReviewBusy(true);
    paths.splice(idx, 1);
    _renderAgreementPreview(paths, opts).catch(_showGenericAgreementError);
    return true;
  }

  function _renderAgreementPreview(paths, opts) {
    var results = document.getElementById("agreement-results");
    var seq = ++_agreementPreviewSeq;
    opts = opts || {};
    _agreementSelectedPaths = Array.isArray(paths) ? paths.slice() : [];
    _stopPoll();
    _invalidateAgreementCompute();
    if (!paths || paths.length < 2) {
      _setAgreementReviewBusy(false);
      results.innerHTML = _initialResults;
      _rememberAgreementPanel("empty", _initialResults, _agreementSelectedPaths);
      _focusAgreementChoose();
      return Promise.resolve();
    }

    _setAgreementReviewBusy(true);
    var body = new URLSearchParams();
    body.set("paths", JSON.stringify(paths));
    return fetch("/api/agreement/preview", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: body.toString()
    })
      .then(function (r) {
        if (!r.ok) { throw new Error("Preview failed"); }
        return r.text();
      })
      .then(function (html) {
        if (seq !== _agreementPreviewSeq) { return; }
        results.innerHTML = html;
        _setAgreementReviewBusy(false);
        _rememberAgreementPanel("review", html, _agreementSelectedPaths);
        if (typeof opts.focusRemoveIndex === "number") {
          _restoreAgreementFocus(opts.focusRemoveIndex);
        } else {
          _focusAgreementTitle();
        }
      });
  }

  function _showAgreementLoading() {
    var results = document.getElementById("agreement-results");
    results.innerHTML =
      _HEADING +
      '<div class="ace-agreement-loading" role="status" aria-live="polite" style="text-align:left">' +
        '<div class="ace-agreement-progress">' +
          '<div class="ace-agreement-progress-bar">' +
            '<div class="ace-agreement-progress-fill" id="ace-agreement-progress-fill" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="-1" style="width:0%"></div>' +
          '</div>' +
          '<div class="ace-agreement-progress-label" id="ace-agreement-progress-label">Computing agreement\u2026</div>' +
          '<div class="ace-agreement-progress-sub" id="ace-agreement-progress-sub"></div>' +
        '</div>' +
      '</div>';
  }

  function _startAgreementProgressPoll() {
    _stopPoll();
    _agreementPoll = setInterval(function () {
      fetch("/api/agreement/progress").then(function (r) { return r.json(); }).then(function (p) {
        var fill = document.getElementById("ace-agreement-progress-fill");
        var label = document.getElementById("ace-agreement-progress-label");
        var sub = document.getElementById("ace-agreement-progress-sub");
        if (!fill) { _stopPoll(); return; }
        if (p.error) {
          _showError("Couldn\u2019t compute agreement", p.error);
          return;
        }
        fill.style.width = p.percent + "%";
        fill.setAttribute("aria-valuenow", String(p.percent));
        label.textContent = "Computing agreement\u2026 " + p.percent + "%";
        sub.textContent = p.stage || "";
      }).catch(function () { /* swallow \u2014 poll retries */ });
    }, 400);
  }

  function _startAgreementCompute(paths) {
    if (_agreementPreviewPending) { return; }
    paths = paths || _selectedAgreementPaths();
    if (!paths || paths.length < 2) {
      document.getElementById("agreement-results").innerHTML = _initialResults;
      return;
    }

    if (_agreementReviewState && !_suppressAgreementHistory) {
      _replaceAgreementHistory(
        _agreementReviewState.kind,
        _agreementReviewState.html,
        _agreementReviewState.paths
      );
      _agreementReviewRestoredFromHistory = false;
    }
    var computeSeq = ++_agreementComputeSeq;
    _activeAgreementComputeSeq = computeSeq;
    _showAgreementLoading();
    if (_agreementReviewState && !_suppressAgreementHistory) {
      _pushAgreementHistory("loading", document.getElementById("agreement-results").innerHTML, paths, computeSeq);
    }
    var progress = document.getElementById("ace-agreement-progress-fill");
    if (progress) {
      progress.focus({ preventScroll: true });
    }
    htmx.ajax("POST", "/api/agreement/compute", {
      values: { paths: JSON.stringify(paths), ace_compute_seq: String(computeSeq) },
      target: "#agreement-results",
      swap: "innerHTML",
    });
    _startAgreementProgressPoll();
  }

  document.addEventListener("click", function (e) {
    var removeBtn = e.target.closest && e.target.closest("[data-agreement-remove]");
    if (removeBtn) {
      e.preventDefault();
      var idx = Number(removeBtn.getAttribute("data-index"));
      _removeAgreementFileAt(idx, { focusRemoveIndex: idx });
      return;
    }

    var computeBtn = e.target.closest && e.target.closest("[data-agreement-compute]");
    if (computeBtn) {
      e.preventDefault();
      var results = document.getElementById("agreement-results");
      var previewPending = results && results.dataset.agreementPreviewPending === "true";
      var buttonBusy = computeBtn.getAttribute("aria-busy") === "true";
      if (_agreementBlockSyntheticComputeAfterRemove && e.isTrusted === false) {
        return;
      }
      if (!computeBtn.disabled && !buttonBusy && !previewPending && !_agreementPreviewSettling) {
        _agreementBlockSyntheticComputeAfterRemove = false;
        _startAgreementCompute();
      }
      return;
    }

    var chooseBtn = e.target.closest && e.target.closest("[data-agreement-choose-again]");
    if (chooseBtn) {
      e.preventDefault();
      window.acePickAndCompute();
    }
  });

  document.addEventListener("keydown", function (e) {
    if (!_agreementShortcutAllowed(e)) { return; }
    var key = e.key;
    var lower = key.length === 1 ? key.toLowerCase() : key;

    if (lower === "f" || lower === "r") {
      e.preventDefault();
      window.acePickAndCompute();
      return;
    }

    if (lower === "c") {
      var compute = document.querySelector("[data-agreement-compute]");
      if (compute && !compute.disabled) {
        e.preventDefault();
        var results = document.getElementById("agreement-results");
        var previewPending = results && results.dataset.agreementPreviewPending === "true";
        var buttonBusy = compute.getAttribute("aria-busy") === "true";
        if (!buttonBusy && !previewPending && !_agreementPreviewSettling) {
          _agreementBlockSyntheticComputeAfterRemove = false;
          _startAgreementCompute();
        }
      }
      return;
    }

    if (key === "ArrowDown" || key === "ArrowUp") {
      if (_agreementFileRows().length) {
        e.preventDefault();
        _focusNextAgreementFileRow(key === "ArrowDown" ? 1 : -1);
      } else {
        var choose = document.querySelector("[data-agreement-pick-start], [data-agreement-choose-again]");
        if (choose) {
          e.preventDefault();
          choose.focus({ preventScroll: true });
        }
      }
      return;
    }

    if (key === "Delete" || key === "Backspace") {
      var idx = _agreementFileIndexFromElement(document.activeElement);
      if (idx >= 0) {
        e.preventDefault();
        _removeAgreementFileAt(idx, { focusRemoveIndex: idx });
      }
      return;
    }

    if (key === "Escape") {
      e.preventDefault();
      window.location.href = "/";
    }
  });

  window.acePickAndCompute = function() {
    fetch("/api/native/pick-files", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "accept=.ace"
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.paths || data.paths.length < 2) {
          _focusAgreementChoose();
          return;
        }
        return fetch("/api/agreement/clear", { method: "POST" })
          .then(function (clearResponse) {
            if (!clearResponse.ok) {
              throw new Error("Could not clear cached agreement results");
            }
            return _renderAgreementPreview(data.paths);
          });
      })
      .catch(_showGenericAgreementError);
  };

  _focusAgreementChoose();

  function _replaceAgreementTerminalHistory(target, detail) {
    if (_suppressAgreementHistory || !target || target.id !== "agreement-results") {
      return;
    }
    var requestConfig = (detail && detail.requestConfig) || {};
    var params = requestConfig.parameters || {};
    var computeSeq = Number(params.ace_compute_seq || 0);
    if (computeSeq && _cancelledAgreementComputeSeqs[computeSeq]) {
      return;
    }
    if (target.querySelector("#ace-agreement-results-title")) {
      _activeAgreementComputeSeq = 0;
      _replaceAgreementHistory("result", target.innerHTML, _selectedAgreementPaths(), computeSeq);
      return;
    }
    if (target.querySelector(".ace-agreement-error")) {
      _activeAgreementComputeSeq = 0;
      _replaceAgreementHistory("error", target.innerHTML, _selectedAgreementPaths(), computeSeq);
    }
  }

  document.addEventListener("htmx:afterSwap", function (e) {
    if (!e.detail || !e.detail.target) {
      return;
    }
    _replaceAgreementTerminalHistory(e.detail.target, e.detail);
  });

  document.addEventListener("htmx:beforeSwap", function (e) {
    if (!e.detail || !e.detail.target || e.detail.target.id !== "agreement-results") {
      return;
    }
    var requestConfig = e.detail.requestConfig || {};
    var params = requestConfig.parameters || {};
    var computeSeq = Number(params.ace_compute_seq || 0);
    if (computeSeq && computeSeq !== _activeAgreementComputeSeq) {
      e.preventDefault();
      e.detail.shouldSwap = false;
    }
  });

  document.addEventListener("htmx:afterSettle", function (e) {
    if (!e.detail || !e.detail.target || e.detail.target.id !== "agreement-results") {
      return;
    }
    var resultTitle = document.getElementById("ace-agreement-results-title");
    if (resultTitle) {
      resultTitle.focus({ preventScroll: true });
      return;
    }
    if (e.detail.target.querySelector(".ace-agreement-error")) {
      _focusAgreementTitle();
    }
  });

  window.addEventListener("popstate", function (e) {
    if (!e.state || e.state.aceAgreement !== true) { return; }
    _suppressAgreementHistory = true;
    try {
      _restoreAgreementState(e.state);
    } finally {
      _suppressAgreementHistory = false;
    }
  });
})();
</script>
{% endblock %}
