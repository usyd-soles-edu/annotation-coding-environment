{% extends "base.html" %}

{% block title %}Agreement — ACE{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/agreement.css">
{% endblock %}

{% block content %}
<div class="ace-agreement-page">
  <a href="/" class="ace-back">← Home</a>

  <div id="agreement-results">
    <h1 class="ace-agreement-title">Inter-Coder Agreement</h1>
    <div class="ace-agreement-empty">
      <p>Select 2 or more .ace files to compute agreement</p>
      <button class="ace-agreement-choose-btn" onclick="acePickAndCompute()">Choose files</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  "use strict";

  var _HEADING = '<h1 class="ace-agreement-title">Inter-Coder Agreement</h1>';
  // Snapshot the server-rendered pick state so the under-2-files branch can
  // restore it verbatim instead of re-typing the markup.
  var _initialResults = (document.getElementById("agreement-results") || {}).innerHTML || "";

  // Single module-level interval handle so a re-pick mid-compute clears the
  // previous poll instead of racing two polls on app.state.agreement_progress.
  var _agreementPoll = null;

  function _stopPoll() {
    if (_agreementPoll) { clearInterval(_agreementPoll); _agreementPoll = null; }
  }

  // Flip the progress bar to its error state. Shared by the transport-failure
  // listener and the poll's error branch (which used to fork the same DOM
  // mutation). subText is optional.
  function _showError(labelText, subText) {
    _stopPoll();
    var fill = document.getElementById("ace-agreement-progress-fill");
    var label = document.getElementById("ace-agreement-progress-label");
    var sub = document.getElementById("ace-agreement-progress-sub");
    if (fill) { fill.classList.add("is-error"); fill.style.width = "100%"; }
    if (label) { label.classList.add("is-error"); label.textContent = labelText; }
    if (sub && subText) { sub.textContent = subText; }
  }

  // I2: a 5xx here would only be a genuine transport failure (the route now
  // always returns 200 with an error fragment). Stop the poll and surface it
  // so the bar doesn't spin forever.
  document.addEventListener("htmx:responseError", function (e) {
    if (!_agreementPoll) { return; }
    var path = e.detail && e.detail.request && e.detail.request.path;
    var verb = e.detail && e.detail.request && e.detail.request.verb;
    if (path === "/api/agreement/compute"
        && String(verb).toUpperCase() === "POST") {
      _showError("Couldn’t reach the server — try again.");
    }
  });

  window.acePickAndCompute = function() {
    var results = document.getElementById("agreement-results");

    _stopPoll();
    fetch("/api/agreement/clear", { method: "POST" })
      .catch(function () { /* picker still works if cache clear already happened */ })
      .then(function () {
        return fetch("/api/native/pick-files", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: "accept=.ace"
        });
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.paths || data.paths.length < 2) {
          // Fewer than 2 files: re-show the pick state instead of failing
          // silently. Also stop any poll left from an abandoned in-flight
          // compute so it can't fire one extra /progress request.
          _stopPoll();
          results.innerHTML = _initialResults;
          return;
        }
        // Show loading state only after files are selected
        results.innerHTML =
          _HEADING +
          '<div class="ace-agreement-loading" role="status" aria-live="polite" style="text-align:left">' +
            '<div class="ace-agreement-progress">' +
              '<div class="ace-agreement-progress-bar">' +
                '<div class="ace-agreement-progress-fill" id="ace-agreement-progress-fill" style="width:0%"></div>' +
              '</div>' +
              '<div class="ace-agreement-progress-label" id="ace-agreement-progress-label">Computing agreement\u2026</div>' +
              '<div class="ace-agreement-progress-sub" id="ace-agreement-progress-sub"></div>' +
            '</div>' +
          '</div>';
        htmx.ajax("POST", "/api/agreement/compute", {
          values: { paths: JSON.stringify(data.paths) },
          target: "#agreement-results",
          swap: "innerHTML",
        });
        // Poll progress while compute runs; stop when results swap the bar out.
        // Clear any previous poll first so a re-pick mid-compute can't race.
        _stopPoll();
        _agreementPoll = setInterval(function () {
          fetch("/api/agreement/progress").then(function (r) { return r.json(); }).then(function (p) {
            var fill = document.getElementById("ace-agreement-progress-fill");
            var label = document.getElementById("ace-agreement-progress-label");
            var sub = document.getElementById("ace-agreement-progress-sub");
            if (!fill) { _stopPoll(); return; }
            if (p.error) {
              _showError("Couldn\u2019t compute agreement", p.error);
              return;
            }
            fill.style.width = p.percent + "%";
            label.textContent = "Computing agreement\u2026 " + p.percent + "%";
            sub.textContent = p.stage || "";
          }).catch(function () { /* swallow \u2014 poll retries */ });
        }, 400);
      })
      .catch(function() {
        results.innerHTML =
          _HEADING +
          '<div class="ace-agreement-error">' +
          '<p>Something went wrong. Please try again.</p>' +
          '<button class="ace-agreement-choose-btn" onclick="acePickAndCompute()">Choose different files</button>' +
          '</div>';
      });
  };
})();
</script>
{% endblock %}
