{% extends "base.html" %}

{% block title %}ACE{% endblock %}

{% block content %}
<main class="ace-landing">
  <div class="ace-home" data-mode="home">

    <!-- Logo -->
    <div class="ace-home-logo">
      <img src="/static/logo-light.svg" alt="ACE" width="140" height="60">
      <p class="ace-home-subtitle">Annotation Coding Environment</p>
    </div>

    <!-- Quick resume (conditional, rendered by JS) -->
    <section id="resume-link"
             class="ace-home-section ace-home-section--resume ace-home-tight"
             aria-label="Quick resume"
             hidden></section>

    <!-- Actions -->
    <nav class="ace-home-section ace-home-actions" aria-label="Project actions">
      <a id="new-project-link" class="ace-home-action"
         href="/new-project" aria-keyshortcuts="n" title="New project">
        <span class="ace-home-action-label">New project</span>
      </a>
      <button id="open-existing-btn" class="ace-home-action"
              type="button" aria-keyshortcuts="o" title="Open project">
        <span class="ace-home-action-label">Open project</span>
      </button>
    </nav>

    <p id="ace-home-message" class="ace-home-message" role="status" aria-live="polite"></p>


    <!-- Tools -->
    <section class="ace-home-section ace-home-tools ace-home-tight" aria-labelledby="tools-title">
      <h2 id="tools-title" class="ace-home-section-title">Tools</h2>
      <a class="ace-home-tool-link" href="/agreement" aria-keyshortcuts="a">
        <span class="ace-home-tool-label">Inter-coder agreement</span>
      </a>
    </section>

    <div id="ace-home-shortcuts" class="ace-home-shortcuts">
      <span class="ace-home-shortcuts-title">Shortcuts</span>
      <span class="ace-home-shortcuts-strip">
        <span class="ace-home-shortcut-pair"><kbd>n</kbd><span>New</span></span>
        <span class="ace-home-shortcut-pair"><kbd>o</kbd><span>Open</span></span>
        <span class="ace-home-shortcut-pair"><kbd>a</kbd><span>Agreement</span></span>
      </span>
    </div>

    <div id="modal-container"></div>
  </div>
</main>
{% endblock %}

{% block scripts %}
<script>
(function() {
  "use strict";

  var pendingRecentPath = "";

  var openExistingBtn = document.getElementById("open-existing-btn");
  var openExistingLabel = openExistingBtn.querySelector(".ace-home-action-label");
  var message = document.getElementById("ace-home-message");
  var modal = document.getElementById("modal-container");

  function setMessage(text, kind) {
    message.textContent = text || "";
    message.dataset.kind = kind || "";
    var live = document.getElementById(kind === "err" ? "ace-live-region-assertive" : "ace-live-region");
    if (live) live.textContent = text || "";
  }

  function isTypingTarget(target) {
    return !!target && !!target.closest &&
      !!target.closest("input, textarea, select, [contenteditable='true']");
  }

  function landingNavItems() {
    return Array.from(document.querySelectorAll(
      "#resume-link:not([hidden]) a, #resume-link:not([hidden]) button, #new-project-link, #open-existing-btn, .ace-home-tool-link"
    )).filter(function(el) {
      return !el.disabled && el.offsetParent !== null;
    });
  }

  function moveLandingFocus(delta) {
    var items = landingNavItems();
    if (!items.length) return;
    var active = document.activeElement;
    var index = items.indexOf(active);
    var nextIndex = index === -1
      ? (delta > 0 ? 0 : items.length - 1)
      : (index + delta + items.length) % items.length;
    items[nextIndex].focus({ preventScroll: true });
  }

  function pickAceFilePath() {
    return fetch("/api/native/pick-file", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "accept=.ace"
    })
      .then(function(r) { return r.json(); })
      .then(function(data) { return data.path || ""; });
  }

  // --- Open existing ---
  function openExisting() {
    if (openExistingBtn.disabled) return;
    setMessage("", "");
    openExistingBtn.disabled = true;
    openExistingBtn.setAttribute("aria-busy", "true");
    openExistingLabel.textContent = "Opening...";
    pickAceFilePath()
      .then(function(path) {
        if (path) openProject(path);
      })
      .catch(function() {
        setMessage("Could not open the file picker. Try again.", "err");
      })
      .finally(function() {
        openExistingBtn.disabled = false;
        openExistingBtn.removeAttribute("aria-busy");
        openExistingLabel.textContent = "Open project";
      });
  }

  function openProject(path) {
    pendingRecentPath = path;
    htmx.ajax("POST", "/api/project/open", {
      values: { path: path },
      target: "#modal-container",
      swap: "innerHTML"
    });
  }

  function getRecent() {
    return window.ACE_RECENTS ? window.ACE_RECENTS.get() : [];
  }

  function addRecent(path) {
    if (window.ACE_RECENTS) window.ACE_RECENTS.add(path);
    renderResume();
  }

  function escapeHtml(str) {
    var d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function clearResume() {
    if (window.ACE_RECENTS) window.ACE_RECENTS.clear();
    renderResume();
  }

  function renderResume() {
    var list = getRecent();
    var el = document.getElementById("resume-link");
    if (!list.length) {
      el.hidden = true;
      document.getElementById("ace-home-shortcuts").innerHTML =
        '<span class="ace-home-shortcuts-title">Shortcuts</span>' +
        '<span class="ace-home-shortcuts-strip">' +
          '<span class="ace-home-shortcut-pair"><kbd>n</kbd><span>New</span></span>' +
          '<span class="ace-home-shortcut-pair"><kbd>o</kbd><span>Open</span></span>' +
          '<span class="ace-home-shortcut-pair"><kbd>a</kbd><span>Agreement</span></span>' +
        '</span>';
      return;
    }
    var parts = list[0].path.split("/");
    var filename = parts.pop();
    var path = list[0].path;
    el.innerHTML = '<h2 class="ace-home-section-title">Quick resume</h2>' +
      '<span class="ace-home-resume-line">' +
        '<a id="resume-project-link" class="ace-home-resume-link" href="#" aria-keyshortcuts="r">' + escapeHtml(filename) + '</a>' +
        '<button id="resume-clear-btn" class="ace-home-resume-close" type="button" title="Clear quick resume" aria-label="Clear quick resume">\u00d7</button>' +
      '</span>';
    el.querySelector("#resume-project-link").addEventListener("click", function(event) {
      event.preventDefault();
      openProject(path);
    });
    el.querySelector("#resume-clear-btn").addEventListener("click", clearResume);
    el.hidden = false;
    document.getElementById("ace-home-shortcuts").innerHTML =
      '<span class="ace-home-shortcuts-title">Shortcuts</span>' +
      '<span class="ace-home-shortcuts-strip">' +
        '<span class="ace-home-shortcut-pair"><kbd>r</kbd><span>Resume</span></span>' +
        '<span class="ace-home-shortcut-pair"><kbd>n</kbd><span>New</span></span>' +
        '<span class="ace-home-shortcut-pair"><kbd>o</kbd><span>Open</span></span>' +
        '<span class="ace-home-shortcut-pair"><kbd>a</kbd><span>Agreement</span></span>' +
      '</span>';
  }

  openExistingBtn.addEventListener("click", openExisting);
  document.addEventListener("keydown", function(event) {
    if (event.defaultPrevented || event.altKey || event.ctrlKey || event.metaKey) return;
    if (isTypingTarget(event.target)) return;
    if (event.key === "ArrowDown" || event.key === "ArrowUp") {
      event.preventDefault();
      moveLandingFocus(event.key === "ArrowDown" ? 1 : -1);
      return;
    }
    var key = event.key.toLowerCase();
    if (key === "r") {
      var resume = document.getElementById("resume-project-link");
      if (resume && !document.getElementById("resume-link").hidden) {
        event.preventDefault();
        resume.click();
      }
    } else if (key === "n") {
      event.preventDefault();
      window.location.href = "/new-project";
    } else if (key === "o") {
      event.preventDefault();
      openExisting();
    } else if (key === "a") {
      event.preventDefault();
      window.location.href = "/agreement";
    }
  });

  function getResponseHeader(xhr, name) {
    if (!xhr) return "";
    return xhr.getResponseHeader(name) || xhr.getResponseHeader(name.toLowerCase()) || "";
  }

  function getOobErrorText(body) {
    if (!body || body.indexOf("ace-statusbar-event--err") === -1) return null;
    var template = document.createElement("template");
    template.innerHTML = body;
    var event = template.content.querySelector("#ace-statusbar-event.ace-statusbar-event--err");
    return event ? event.textContent.trim() : "Could not complete request.";
  }

  document.addEventListener("htmx:afterRequest", function(evt) {
    var pathInfo = evt.detail.pathInfo || {};
    var requestConfig = evt.detail.requestConfig || {};
    var path = pathInfo.requestPath || pathInfo.finalRequestPath || requestConfig.path;
    if (path !== "/api/project/open") return;
    var xhr = evt.detail.xhr;
    var body = (xhr && xhr.responseText) || "";
    var redirected = getResponseHeader(xhr, "HX-Redirect");
    var errorText = getOobErrorText(body);
    var is2xx = xhr && xhr.status >= 200 && xhr.status < 300;
    if (errorText !== null) {
      setMessage(errorText, "err");
      pendingRecentPath = "";
      return;
    }
    if (is2xx && redirected && pendingRecentPath) {
      addRecent(pendingRecentPath);
    }
    if (redirected) {
      pendingRecentPath = "";
      setMessage("", "");
    }
  });

  // --- Init ---
  renderResume();
})();
</script>
{% endblock %}
