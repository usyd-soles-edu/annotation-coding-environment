{% extends "base.html" %}

{% block title %}ACE{% endblock %}

{% block content %}
<main class="ace-landing">
  <div class="ace-home">

    <!-- Logo -->
    <div class="ace-home-logo">
      <img src="/static/logo-light.svg" alt="ACE" width="140" height="60">
      <p class="ace-home-subtitle">Annotation Coding Environment</p>
    </div>

    <!-- Resume (conditional, rendered by JS) -->
    <div id="resume-link" class="ace-home-resume" hidden></div>

    <!-- Actions -->
    <div class="ace-home-actions">
      <button id="new-project-link" class="ace-home-action-primary" type="button">
        New project
      </button>
      <button id="open-existing-btn" class="ace-home-action-secondary" type="button">
        Open existing
      </button>
    </div>

    <form id="new-project-form" class="ace-home-form" hidden>
      <label class="ace-home-field">
        <span class="ace-home-label">Project name</span>
        <input id="new-project-input" class="ace-home-input"
               name="name" autocomplete="off">
      </label>

      <div class="ace-home-location">
        <span class="ace-home-label">Location</span>
        <button id="choose-project-folder-btn" class="ace-btn" type="button">
          Choose folder
        </button>
        <span id="new-project-folder-label" class="ace-home-path">No folder chosen</span>
        <input id="new-project-folder" name="folder" type="hidden" value="">
      </div>

      <p id="new-project-path-preview" class="ace-home-path-preview" aria-live="polite"></p>

      <div class="ace-home-form-actions">
        <button id="create-project-btn" class="ace-btn ace-btn--primary" type="submit" disabled>
          Create project
        </button>
        <button id="cancel-new-project-btn" class="ace-btn" type="button">
          Cancel
        </button>
      </div>
    </form>

    <p id="ace-home-message" class="ace-home-message" role="status" aria-live="polite"></p>


    <!-- Tools -->
    <div class="ace-home-tools">
      <p class="ace-home-section-label">Tools</p>
      <a class="ace-home-tool-link" href="/agreement">Inter-Coder Agreement</a>
    </div>

    <div id="modal-container"></div>
  </div>
</main>
{% endblock %}

{% block scripts %}
<script>
(function() {
  "use strict";

  var STORAGE_KEY = "ace-recent-files";
  var selectedFolder = "";
  var pendingOverwrite = false;
  var pendingRecentPath = "";

  var newProjectBtn = document.getElementById("new-project-link");
  var openExistingBtn = document.getElementById("open-existing-btn");
  var form = document.getElementById("new-project-form");
  var nameInput = document.getElementById("new-project-input");
  var folderInput = document.getElementById("new-project-folder");
  var folderLabel = document.getElementById("new-project-folder-label");
  var chooseFolderBtn = document.getElementById("choose-project-folder-btn");
  var pathPreview = document.getElementById("new-project-path-preview");
  var createBtn = document.getElementById("create-project-btn");
  var cancelBtn = document.getElementById("cancel-new-project-btn");
  var message = document.getElementById("ace-home-message");
  var modal = document.getElementById("modal-container");

  function setMessage(text, kind) {
    message.textContent = text || "";
    message.dataset.kind = kind || "";
    var live = document.getElementById(kind === "err" ? "ace-live-region-assertive" : "ace-live-region");
    if (live) live.textContent = text || "";
  }

  function projectName() {
    return nameInput.value.trim();
  }

  function projectPath() {
    if (!selectedFolder || !projectName()) return "";
    return selectedFolder.replace(/\/$/, "") + "/" + projectName().replace(/\.ace$/, "") + ".ace";
  }

  function updateFormState() {
    var path = projectPath();
    folderInput.value = selectedFolder;
    folderLabel.textContent = selectedFolder || "No folder chosen";
    pathPreview.textContent = path ? "Project file: " + path : "";
    createBtn.disabled = !(projectName() && selectedFolder);
  }

  function showNewProjectForm() {
    form.hidden = false;
    pendingOverwrite = false;
    modal.innerHTML = "";
    setMessage("", "");
    nameInput.focus();
    updateFormState();
  }

  function hideNewProjectForm() {
    form.hidden = true;
    nameInput.value = "";
    selectedFolder = "";
    pendingOverwrite = false;
    pendingRecentPath = "";
    modal.innerHTML = "";
    setMessage("", "");
    updateFormState();
    newProjectBtn.focus();
  }

  function handlePickerFailure() {
    chooseFolderBtn.disabled = false;
    chooseFolderBtn.textContent = "Choose folder";
    setMessage("Could not open the folder picker. Try again.", "err");
  }

  function selectedPath(value) {
    if (!value) return "";
    if (Array.isArray(value)) return value[0] || "";
    if (typeof value === "string") return value;
    return value.path || String(value);
  }

  function pathFromNativeSelection(value) {
    var path = selectedPath(value);
    if (!path || path.indexOf("file://") !== 0) return path;
    try {
      var parsed = new URL(path);
      var decoded = decodeURIComponent(parsed.pathname);
      return decoded.match(/^\/[A-Za-z]:\//) ? decoded.slice(1) : decoded;
    } catch (_) {
      return path;
    }
  }

  function tauriDialogOpen() {
    var tauri = window.__TAURI__;
    return tauri && tauri.dialog && typeof tauri.dialog.open === "function"
      ? tauri.dialog.open
      : null;
  }

  function pickFolderPath() {
    var open = tauriDialogOpen();
    if (open) {
      return open({ directory: true, multiple: false }).then(pathFromNativeSelection);
    }
    return fetch("/api/native/pick-folder", { method: "POST" })
      .then(function(r) { return r.json(); })
      .then(function(data) { return data.path || ""; });
  }

  function pickAceFilePath() {
    var open = tauriDialogOpen();
    if (open) {
      return open({
        multiple: false,
        filters: [{ name: "ACE Project", extensions: ["ace"] }]
      }).then(pathFromNativeSelection);
    }
    return fetch("/api/native/pick-file", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "accept=.ace"
    })
      .then(function(r) { return r.json(); })
      .then(function(data) { return data.path || ""; });
  }

  newProjectBtn.addEventListener("click", showNewProjectForm);
  cancelBtn.addEventListener("click", hideNewProjectForm);
  nameInput.addEventListener("input", updateFormState);
  form.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
      e.preventDefault();
      hideNewProjectForm();
    }
  });

  chooseFolderBtn.addEventListener("click", function() {
    setMessage("", "");
    chooseFolderBtn.disabled = true;
    chooseFolderBtn.textContent = "Choosing folder...";
    pickFolderPath()
      .then(function(path) {
        chooseFolderBtn.disabled = false;
        chooseFolderBtn.textContent = "Choose folder";
        if (!path) return;
        selectedFolder = path;
        updateFormState();
      })
      .catch(handlePickerFailure);
  });

  form.addEventListener("submit", function(e) {
    e.preventDefault();
    var path = projectPath();
    if (!path) return;
    setMessage("Creating project...", "");
    createBtn.disabled = true;
    pendingRecentPath = path;
    Promise.resolve(htmx.ajax("POST", "/api/project/create", {
      values: { name: projectName(), path: path, overwrite: pendingOverwrite ? "true" : "false" },
      target: "#modal-container",
      swap: "innerHTML"
    })).finally(function() {
      createBtn.disabled = false;
      updateFormState();
    });
  });

  window._aceConfirmOverwrite = function() {
    pendingOverwrite = true;
    form.requestSubmit();
  };

  window._aceChooseAnotherFolder = function() {
    pendingOverwrite = false;
    pendingRecentPath = "";
    modal.innerHTML = "";
    chooseFolderBtn.focus();
  };

  // --- Open existing ---
  function openExisting() {
    setMessage("", "");
    pickAceFilePath()
      .then(function(path) {
        if (path) openProject(path);
      })
      .catch(function() {
        setMessage("Could not open the file picker. Try again.", "err");
      });
  }

  function openProject(path) {
    pendingRecentPath = path;
    htmx.ajax("POST", "/api/project/open", {
      values: { path: path },
      target: "#modal-container",
      swap: "innerHTML"
    });
  }

  // --- Recent files ---
  function migrateRecent(raw) {
    if (!Array.isArray(raw)) return [];
    return raw.map(function(item) {
      if (typeof item === "string") return { path: item, openedAt: 0 };
      if (item && typeof item.path === "string") return item;
      return null;
    }).filter(Boolean);
  }

  function getRecent() {
    try {
      var raw = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      return migrateRecent(raw);
    } catch(e) { return []; }
  }

  function addRecent(path) {
    var list = getRecent().filter(function(item) { return item.path !== path; });
    list.unshift({ path: path, openedAt: Date.now() });
    if (list.length > 5) list = list.slice(0, 5);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    renderResume();
  }

  function escapeHtml(str) {
    var d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function clearResume() {
    localStorage.removeItem(STORAGE_KEY);
    renderResume();
  }

  function renderResume() {
    var list = getRecent();
    var el = document.getElementById("resume-link");
    if (!list.length) {
      el.hidden = true;
      return;
    }
    var parts = list[0].path.split("/");
    var filename = parts.pop();
    var path = list[0].path;
    el.innerHTML = '<a href="#">' + escapeHtml(filename) + '</a>' +
      '<button class="ace-home-resume-close" title="Dismiss">\u00d7</button>';
    el.querySelector("a").addEventListener("click", function(event) {
      event.preventDefault();
      openProject(path);
    });
    el.querySelector("button").addEventListener("click", clearResume);
    el.hidden = false;
  }

  openExistingBtn.addEventListener("click", openExisting);

  function getResponseHeader(xhr, name) {
    if (!xhr) return "";
    return xhr.getResponseHeader(name) || xhr.getResponseHeader(name.toLowerCase()) || "";
  }

  function getOobErrorText(body) {
    if (!body || body.indexOf("ace-statusbar-event--err") === -1) return null;
    var template = document.createElement("template");
    template.innerHTML = body;
    var event = template.content.querySelector("#ace-statusbar-event.ace-statusbar-event--err");
    return event ? event.textContent.trim() : "Could not complete request.";
  }

  document.addEventListener("htmx:afterRequest", function(evt) {
    var pathInfo = evt.detail.pathInfo || {};
    var requestConfig = evt.detail.requestConfig || {};
    var path = pathInfo.requestPath || pathInfo.finalRequestPath || requestConfig.path;
    if (path !== "/api/project/open" && path !== "/api/project/create") return;
    var xhr = evt.detail.xhr;
    var body = (xhr && xhr.responseText) || "";
    var redirected = getResponseHeader(xhr, "HX-Redirect");
    var errorText = getOobErrorText(body);
    var is2xx = xhr && xhr.status >= 200 && xhr.status < 300;
    if (errorText !== null) {
      setMessage(errorText, "err");
      pendingRecentPath = "";
      return;
    }
    if (is2xx && redirected && pendingRecentPath) {
      addRecent(pendingRecentPath);
    }
    if (redirected || path === "/api/project/create") {
      pendingRecentPath = "";
      setMessage("", "");
    }
  });

  // --- Init ---
  renderResume();
})();
</script>
{% endblock %}
