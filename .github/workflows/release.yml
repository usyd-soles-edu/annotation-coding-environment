name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (for example v0.16.0)'
        required: true
        type: string

permissions:
  contents: write

# Don't cancel an in-flight release if a second tag push races in — we'd rather
# finish one cleanly than half-publish two.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Preflight — fail fast (~10 s) if GITHUB_TOKEN lacks contents:write, so we
  # don't burn 30 min of Rust compilation just to 403 at the release step.
  # Repo Settings → Actions → General → Workflow permissions must be set to
  # "Read and write permissions" for the token-level permissions: block to
  # actually elevate (workflows cannot expand beyond the repo-level default).
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify release API write access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROBE="preflight-${{ github.run_id }}"
          RESP=$(gh api -X POST /repos/${{ github.repository }}/releases \
            -f tag_name="$PROBE" -f name="$PROBE" -F draft=true 2>&1) || {
            echo "::error::GITHUB_TOKEN lacks contents:write. Fix via repo Settings → Actions → General → Workflow permissions → 'Read and write permissions'."
            echo "Response: $RESP"
            exit 1
          }
          gh api -X DELETE /repos/${{ github.repository }}/releases/$(echo "$RESP" | jq -r .id) > /dev/null
          echo "Release API write access confirmed."

  prepare_release:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create or reuse draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_INPUT: ${{ inputs.tag }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${TAG_INPUT}"
            git ls-remote --exit-code --tags "https://github.com/${{ github.repository }}.git" "refs/tags/$TAG" > /dev/null || {
              echo "::error::Requested tag $TAG does not exist on origin."
              exit 1
            }
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          RELEASE_META=$(gh api /repos/${{ github.repository }}/releases \
            --jq ".[] | select(.tag_name == \"$TAG\") | \"\(.id) \(.draft)\"" | head -1)
          if [ -n "$RELEASE_META" ]; then
            RELEASE_ID="${RELEASE_META%% *}"
            RELEASE_DRAFT="${RELEASE_META##* }"
            if [ "$RELEASE_DRAFT" != "true" ]; then
              echo "::error::Release $TAG already exists and is not a draft."
              exit 1
            fi
            exit 0
          fi
          gh api -X POST /repos/${{ github.repository }}/releases \
            -f tag_name="$TAG" \
            -f name="ACE v${VERSION}" \
            -F draft=true \
            -f body="## Download

          | Platform | File |
          |---|---|
          | macOS (Apple Silicon) | \`ACE_x.x.x_aarch64.dmg\` |
          | Windows | \`ACE_x.x.x_x64-setup.exe\` |

          **macOS:** Open the \`.dmg\`, drag ACE to Applications.
          **Windows:** Run the installer. You may see a SmartScreen warning — click \"More info\" then \"Run anyway\".

          Not code-signed yet — macOS and Windows will show \"unknown developer\" / SmartScreen warnings on install. Signing is planned for a future release." > /dev/null

  build:
    needs: [preflight, prepare_release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15            # ARM64 (Apple Silicon)
          # - platform: macos-15-large    # x86_64 (Intel) — requires paid runner

          - platform: windows-2025

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/launcher -> target

      - name: Install cargo-packager
        run: cargo install cargo-packager --version 0.11.8 --locked

      - name: Nuitka cache
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Nuitka
            ~/.cache/Nuitka
            ~/.cache/ccache
            ~\AppData\Local\Nuitka
            ~\AppData\Local\ccache
          key: nuitka-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml', 'src/ace/**/*.py', 'src/ace/static/**', 'src/ace/templates/**', 'scripts/build_sidecar.py') }}
          restore-keys: |
            nuitka-${{ runner.os }}-

      - name: Build launcher package
        run: uv run python scripts/build_launcher_package.py

      - name: Find installer artifacts
        id: artifacts
        shell: bash
        run: |
          ARTIFACTS=$(find desktop/launcher/target/release -type f \
            \( -name '*.dmg' -o -name '*.msi' -o -iname '*setup*.exe' \) \
            -print)
          if [ -z "$ARTIFACTS" ]; then
            echo "::error::No installer artifacts (.dmg/.msi/*setup*.exe) found under desktop/launcher/target/release/"
            exit 1
          fi
          printf 'files<<EOF\n%s\nEOF\n' "$ARTIFACTS" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifacts to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_INPUT: ${{ inputs.tag }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${TAG_INPUT}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          find desktop/launcher/target/release -type f \
            \( -name '*.dmg' -o -name '*.msi' -o -iname '*setup*.exe' \) \
            -print |
          while IFS= read -r artifact; do
            echo "Uploading $(basename "$artifact")..."
            gh release upload "$TAG" "$artifact" --clobber
          done
