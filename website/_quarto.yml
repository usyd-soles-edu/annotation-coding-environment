project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "user-guide/*.qmd"
    - "reference/*.qmd"

website:
  title: "ACE"
  site-url: "https://usyd-soles-edu.github.io/annotation-coding-environment/"
  favicon: "assets/logo.svg"
  search: true
  sidebar:
    style: docked
    logo: "assets/logo.svg"
    search: true
    contents:
      - section: "Start here"
        contents:
          - text: "Welcome"
            href: index.qmd
          - text: "Get ACE"
            href: install.qmd
          - text: "Quick start"
            href: getting-started.qmd
          - text: "Try the sample data"
            href: sample-data.qmd
      - section: "Build a project"
        contents:
          - text: "Overview"
            href: workflow.qmd
          - text: "Import sources"
            href: user-guide/import.qmd
          - text: "Create a codebook"
            href: user-guide/codebooks.qmd
          - text: "Add source notes"
            href: user-guide/notes.qmd
      - section: "Code your data"
        contents:
          - text: "Code text"
            href: user-guide/coding.qmd
          - text: "Keyboard shortcuts"
            href: reference/shortcuts.qmd
      - section: "Review your work"
        contents:
          - text: "Overview"
            href: review-export.qmd
          - text: "Agreement"
            href: user-guide/agreement.qmd
          - text: "Export data"
            href: user-guide/export.qmd
      - section: "Reference"
        contents:
          - text: "Overview"
            href: reference/index.qmd
          - text: "Project files"
            href: reference/file-format.qmd
          - text: "FAQ"
            href: reference/faq.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    code-copy: true
    link-external-newwindow: true

execute:
  freeze: auto
