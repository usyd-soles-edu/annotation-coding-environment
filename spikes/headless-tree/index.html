<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACE Headless Tree Spike</title>
  <link rel="stylesheet" href="./spike.css">
</head>
<body>
  <main id="ace-headless-tree-spike" class="ace-spike-shell">
    <section class="ace-spike-panel" aria-labelledby="spike-title">
      <header class="ace-spike-header">
        <div>
          <p class="ace-spike-kicker">ACE codebook spike</p>
          <h1 id="spike-title">Headless Tree interaction surface</h1>
        </div>
        <div class="ace-spike-actions" aria-label="Spike actions">
          <button type="button" id="move-literature-into">
            Move Literature into Suggestions
          </button>
          <button type="button" id="move-literature-top">
            Move Literature to top of Suggestions
          </button>
          <button type="button" id="move-draft-middle">
            Move Draft into Positive
          </button>
        </div>
      </header>

      <div class="ace-spike-grid">
        <div id="ace-spike-tree"
             class="ace-spike-tree"
             aria-label="Headless Tree codebook spike"></div>
        <aside class="ace-spike-debug" aria-labelledby="spike-debug-title">
          <h2 id="spike-debug-title">Operations</h2>
          <pre id="ace-spike-operations" aria-live="polite"></pre>
        </aside>
      </div>
    </section>
  </main>
  <script src="./spike.bundle.js"></script>
</body>
</html>
